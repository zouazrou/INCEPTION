services:
  nginx:
    restart: always
    build: ./requirements/nginx/.
    container_name: nginx
    image: nginx:1337
    ports:
      - 443:443
    volumes:
      - wordpress_files:/var/www/html
    networks:
      inception:
    env_file:
      - path : .env
        required: true
  
  wordpress:
    restart: always
    build: ./requirements/wordpress/.
    container_name: wordpress
    image: wordpress:1337
    volumes:
      - wordpress_files:/var/www/html
    networks:
      inception:
    env_file:
      - path : .env
        required: true

  mariadb:
    restart: always
    build: ./requirements/mariadb/.
    container_name: mariadb
    image: mariadb:1337
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      inception:
    env_file:
      - path : .env
        required: true

networks:
  inception:
    driver: bridge

volumes:
  wordpress_files:
    driver: local
    driver_opts:
      type: 'none'
      o: 'bind'
      device: '/home/${USER}/data/web'

  mariadb_data:
    driver: local
    driver_opts:
      type: 'none'
      o: 'bind'
      device: '/home/${USER}/data/db'